<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app">
        <style>
            .initial-loading {
                height: 100vh;
                width: 100vw;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #F9FAFB;
                color: #111827;
                font-family: 'Inter', sans-serif;
            }
            .spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(99, 102, 241, 0.1);
                border-left-color: #6366F1;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-bottom: 20px;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            .loading-text {
                font-size: 1rem;
                font-weight: 600;
                letter-spacing: 2px;
                color: #6366F1;
                text-transform: uppercase;
            }
        </style>
        <div class="initial-loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading Workspace</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/main.js" type="module" defer></script>
</body>

</html>
