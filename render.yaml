services:
  - type: web
    name: college-cms
    runtime: node
    plan: free
    buildCommand: npm run install-backend
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
